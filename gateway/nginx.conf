# ============================================================
# SILKGENESIS - NGINX PRODUCTION DARKNET
# Frontend React built statically + API FastAPI
# Optimized for Tor Hidden Service v3
# ============================================================

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ============================================================
    # SECURITE MAXIMALE - Headers anti-fuite
    # ============================================================
    server_tokens off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # CSP ultra-strict - ZERO ressource externe (anti-fuite IP)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Pas de cache pour les pages sensibles
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;

    # ============================================================
    # PERFORMANCE
    # ============================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 30s;
    reset_timedout_connection on;

    # Gzip pour Tor (reduces response size ~70%)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1000;

    # ============================================================
    # LOGS ANONYMISES (pas d'IP - Tor)
    # ============================================================
    log_format tor_safe '$time_local "$request" $status $body_bytes_sent "$http_user_agent"';
    access_log /var/log/nginx/access.log tor_safe;

    # Connexion / socket limits (anti slowloris). Pas de limit_req par IP : derriere un
    # hidden service Tor, Nginx voit souvent 127.0.0.1 pour tout le monde — un seul compteur
    # throttle tout le site. Le rate limiting applicatif (FastAPI) reste actif.
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ============================================================
    # UPSTREAM BACKEND
    # ============================================================
    upstream backend {
        server 127.0.0.1:5000;
        keepalive 32;
    }

    # ============================================================
    # SERVEUR PRINCIPAL - Port 80 (Tor)
    # ============================================================
    server {
        listen 80;
        server_name localhost;

        # Timeout pour connections Tor (plus lentes)
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;

        limit_conn conn_limit 200;

        # ============================================================
        # API BACKEND - Proxy vers FastAPI (port 5000)
        # ============================================================
        location ^~ /api/admin/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Forwarded-Proto "";

            if ($request_method = OPTIONS) { return 204; }
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            # ZERO info sur le client (anonymat Tor)
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Forwarded-Proto "";

            # CORS is enforced in backend with explicit allowlist.
            if ($request_method = OPTIONS) { return 204; }
        }

        location = /api/login {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
        }

        location = /api/register {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
        }

        # ============================================================
        # FRONTEND REACT - Build statique (production)
        # ============================================================
        root /app/frontend/build;
        index index.html;

        # Pas de cache pour index.html (SPA)
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
            try_files /index.html =404;
        }

        # Cache long pour assets hashés (JS/CSS buildés par React)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ============================================================
        # HEALTH CHECK
        # ============================================================
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"silkgenesis"}';
            add_header Content-Type application/json;
        }

        # ============================================================
        # BLOQUER les fichiers sensibles
        # ============================================================
        location ~ /\. {
            deny all;
            return 404;
        }

        location ~ \.(py|db|sql|env|log|bak)$ {
            deny all;
            return 404;
        }
    }
}
