# ============================================================
# SILKGENESIS - NGINX PRODUCTION CONFIG (Tor Hidden Service)
# ============================================================
# Usage: nginx -c /path/to/nginx.prod.conf
# Sert le build React statique + proxifie l'API backend

worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ============================================================
    # SECURITE - Pas de logs d'IP (Tor anonymity)
    # ============================================================
    log_format tor_safe '$time_iso8601 "$request" $status $body_bytes_sent "$http_referer"';
    # Note: $remote_addr intentionnellement absent
    access_log /var/log/nginx/access.log tor_safe;

    # ============================================================
    # PERFORMANCE
    # ============================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 30s;
    reset_timedout_connection on;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_comp_level 6;

    # Connexions seulement : derriere Tor HS, limit_req par $binary_remote_addr est contre-productif.
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ============================================================
    # SERVEUR PRINCIPAL
    # ============================================================
    server {
        listen 80;
        server_name localhost;

        limit_conn conn_limit 200;

        # ============================================================
        # HEADERS DE SECURITE
        # ============================================================
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # CSP strict - bloque toutes ressources externes
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # Cache-Control pour les assets statiques
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        # ============================================================
        # FRONTEND REACT (build statique)
        # ============================================================
        root /app/frontend/build;
        index index.html;

        # ============================================================
        # API BACKEND (proxy vers Python FastAPI)
        # NOTE: doit etre AVANT `location /` (sinon la SPA capture /api/*)
        # ============================================================

        location ^~ /api/admin/ {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            proxy_read_timeout 60s;
        }

        location = /api/login {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            proxy_read_timeout 30s;
        }

        location = /api/register {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            proxy_read_timeout 30s;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            client_max_body_size 10m;
        }

        location /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","service":"silkgenesis"}';
        }

        # Servir les assets avec cache long
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # SPA routing - toutes les routes non-API vont vers index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ============================================================
        # SECURITE - Bloquer les fichiers sensibles
        # ============================================================
        location ~ /\. {
            deny all;
            return 404;
        }

        location ~ \.(py|env|db|sqlite|json|log|ps1|bat|sh)$ {
            deny all;
            return 404;
        }

        # Bloquer les scanners
        location ~ (wp-admin|phpMyAdmin|\.php|\.asp|\.aspx) {
            return 444;
        }

        # ============================================================
        # PAGES D'ERREUR PERSONNALISEES
        # ============================================================
        error_page 404 /index.html;
        error_page 500 502 503 504 /index.html;
    }
}
