# SilkGenesis — stack prod Tor (gateway Tor+Nginx + API + Monero RPC)
# Prerequis : cp env.example .env && editer .env (MONERO_RPC_URL obligatoire selon ton setup)
# Build front : cd frontend && npm ci && npm run build
# Demarrage : docker compose up -d --build
# Wallet Docker optionnel : docker compose --profile bundled-monero up -d --build
#
# L'API utilise SQLite + JSON sous SILKGENESIS_DATA_DIR (/app/data), pas PostgreSQL.

services:
  gateway:
    build: ./gateway
    container_name: sg_gateway
    depends_on:
      api:
        condition: service_healthy
    networks:
      - silk-net
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./frontend/build:/app/frontend/build:ro
      - ./gateway/tor-data:/var/lib/tor
      - ./gateway/tor-logs:/var/log/tor
    restart: unless-stopped

  api:
    build: ./api-service
    container_name: sg_api
    depends_on:
      price-oracle:
        condition: service_started
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SILKGENESIS_DATA_DIR: /app/data
      MONERO_RPC_URL: ${MONERO_RPC_URL:-http://host.docker.internal:18082/json_rpc}
      PRICE_ORACLE_URL: http://price-oracle:9000/latest
    volumes:
      - silkgenesis_prod_data:/app/data
    expose:
      - "5000"
    networks:
      - silk-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=6).read()",
        ]
      interval: 25s
      timeout: 10s
      retries: 6
      start_period: 120s

  price-oracle:
    build: ./price-oracle
    container_name: sg_price_oracle
    env_file:
      - .env
    environment:
      PRICE_ORACLE_REFRESH_SEC: ${PRICE_ORACLE_REFRESH_SEC:-20}
      PRICE_ORACLE_ALLOW_CLEARNET: ${PRICE_ORACLE_ALLOW_CLEARNET:-0}
      PRICE_ORACLE_EXPOSE_ERROR_DETAIL: ${PRICE_ORACLE_EXPOSE_ERROR_DETAIL:-0}
      PRICE_ORACLE_TOKEN: ${PRICE_ORACLE_TOKEN:-}
      PRICE_ORACLE_FALLBACK_XMR_USD: ${PRICE_ORACLE_FALLBACK_XMR_USD:-165.0}
      PRICE_ORACLE_FALLBACK_BTC_USD: ${PRICE_ORACLE_FALLBACK_BTC_USD:-74000.0}
    expose:
      - "9000"
    networks:
      - silk-net
    restart: unless-stopped

  # Optionnel : docker compose --profile bundled-monero up -d
  # Sinon utilise monero-wallet-rpc sur l'hote et MONERO_RPC_URL=http://host.docker.internal:18082 (ou reseau equivalent).
  monero-rpc:
    profiles:
      - bundled-monero
    image: sethforprivacy/monero-wallet-rpc:latest
    container_name: sg_monero_rpc
    env_file:
      - .env
    volumes:
      - ./monero-data:/wallet
    command:
      - --rpc-bind-ip=0.0.0.0
      - --rpc-bind-port=18083
      - --rpc-login=${MONERO_RPC_USER}:${MONERO_RPC_PASS}
      - --daemon-address=${MONERO_DAEMON_ADDRESS:-127.0.0.1:18081}
      - --wallet-dir=/wallet
      - --untrusted-daemon
      - --confirm-external-bind
    networks:
      - silk-net
    restart: unless-stopped

networks:
  silk-net:
    driver: bridge

volumes:
  silkgenesis_prod_data:
